name: Backend CI

on:
  push:
    paths:
      - "pom.xml"
      - "src/**"
      - "Dockerfile"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "pom.xml"
      - "src/**"
      - "Dockerfile"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Package jar
        run: mvn -B -DskipTests package

      - name: Docker build check
        run: docker build -t amazon-java-backend:ci .
